statusline:
  # Display mode: default (3-line), full (5-line)
  mode: "default"

  # Preset name: full, minimal, custom
  preset: "full"

  # Theme name: default, catppuccin-mocha, catppuccin-latte
  theme: "default"

  # Individual segment toggles (only used when preset is "custom")
  segments:
    model: true
    context: true
    output_style: true
    directory: true
    git_status: true
    claude_version: true
    moai_version: true
    git_branch: true
